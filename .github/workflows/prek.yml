name: Lint (prek)

on:
  pull_request:
  push:
    branches: [main]
    # Don't run on tags to avoid duplicate runs with the release workflow
    tags-ignore: ["*"]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run prek
        run: uv run prek run --all-files --show-diff-on-failure --color=always
