name: Tests

on:
  pull_request:
  push:
    branches: [main]
    tags-ignore: ["*"]

# Cancel in-progress runs from the same PR/branch when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and type-check on a bare install — matches the surface the
  # README's "pip install clickhouse-async" footprint actually has.
  # Runs once on the lowest supported Python; the lint rules don't
  # depend on Python minor.
  lint:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install (no extras)
        # `uv sync` excludes optional extras by default — pulling them
        # in requires an explicit `--extra <name>`. The bare install
        # is what `pip install clickhouse-async` users land on.
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check

      - name: Ty
        run: uv run ty check

  # Unit tests against the bare install on every supported Python.
  # No optional libs installed — exercises the import-clean discipline
  # (compression imports must stay lazy) and the MissingExtraError
  # paths (mocked via monkeypatch in the unit suite).
  unit-bare:
    name: Unit (bare) — Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install (no extras)
        # `uv sync` excludes optional extras by default — pulling them
        # in requires an explicit `--extra <name>`. The bare install
        # is what `pip install clickhouse-async` users land on.
        run: uv sync --frozen

      - name: Verify the bare install stays import-clean
        run: |
          uv run python -c "import clickhouse_async; print('version:', clickhouse_async.__version__)"

      - name: Unit tests
        run: uv run pytest tests/unit -q --timeout=10 --cov --cov-branch --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # Full suite — unit + integration — with the compression extra
  # installed and a real ClickHouse server. The ClickHouse version
  # matrix covers the oldest supported LTS (24.8) and the current
  # target LTS (.clickhouse-version), ensuring backward compatibility
  # is not silently broken.
  full:
    name: Unit + integration — Python ${{ matrix.python }} / ClickHouse ${{ matrix.clickhouse }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        clickhouse: ["24.8", "26.3"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install (with compression extra)
        run: uv sync --frozen --extra compression

      - name: Start ClickHouse ${{ matrix.clickhouse }}
        run: ./scripts/clickhouse.sh up
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}

      - name: Unit tests
        run: uv run pytest tests/unit -q --timeout=10

      - name: Integration tests
        # Pin to 127.0.0.1 explicitly. Linux Docker hosts publish ports
        # only on the IPv4 loopback by default, and asyncio's resolver
        # may try the IPv6 entry first when given the literal "localhost"
        # — that path can connect through Docker's userland proxy and
        # then RST on read, masking the real port-mapping behaviour. The
        # IPv4 literal sidesteps the dual-stack ambiguity entirely.
        run: |
          uv run pytest tests/integration \
            --localdb=clickhouse://clickhouse:clickhouse@127.0.0.1:9000/clickhouse \
            -m integration -q --timeout=60

      - name: ClickHouse logs on failure
        if: failure()
        run: ./scripts/clickhouse.sh logs --tail 300 || true

      - name: Stop ClickHouse
        if: always()
        run: ./scripts/clickhouse.sh down || true

  # Scenario tests against real public ClickHouse example datasets.
  # Loads three datasets directly from GCS/S3 into an ephemeral
  # ClickHouse server and runs analytics queries that mirror real-world
  # usage patterns. Network access is required; data is pulled by the
  # server via url() / s3() — no Python-side downloads.
  scenarios:
    name: Example scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install (with compression extra)
        run: uv sync --frozen --extra compression

      - name: Start ClickHouse
        run: ./scripts/clickhouse.sh up

      - name: Run scenario tests
        run: |
          uv run pytest tests/scenarios -m scenarios -v \
            --timeout=300 \
            --localdb=clickhouse://clickhouse:clickhouse@127.0.0.1:9000/clickhouse
        env:
          # Disable compression during large data loads to avoid compression
          # overhead on the inbound INSERT path; query tests use the default.
          CLICKHOUSE_ASYNC_DEFAULT_COMPRESSION: "off"

      - name: ClickHouse logs on failure
        if: failure()
        run: ./scripts/clickhouse.sh logs --tail 300 || true

      - name: Stop ClickHouse
        if: always()
        run: ./scripts/clickhouse.sh down || true
