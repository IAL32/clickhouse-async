repos:
  - repo: local
    hooks:
      - id: commitizen
        name: Check commit message
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: /bin/bash -c "uv run mypy ."
        language: system
