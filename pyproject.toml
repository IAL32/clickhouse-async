[project]
name = "clickhouse-async"
version = "0.1.0"
description = "Async Python client for ClickHouse"
authors = [{ name = "Author", email = "author@example.com" }]
requires-python = "~=3.11"
readme = "README.md"
dependencies = []

[dependency-groups]
dev = [
]

[tool.hatch.build.targets.sdist]
include = ["clickhouse_async"]

[tool.hatch.build.targets.wheel]
include = ["clickhouse_async"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
# Enable pycodestyle (E), Pyflakes (F), isort (I), and more
lint.select = ["E", "F", "I", "W", "N", "B", "A", "C4", "UP", "ANN", "RUF", "T"]
# Allow unused variables when underscore-prefixed
lint.ignore = ["E501"]
# Exclude a variety of commonly ignored directories
exclude = [".git", ".ruff_cache", "__pycache__", "dist", "build"]
# Same as Black
line-length = 88
# Assume Python 3.11
target-version = "py311"

[tool.ruff.lint.isort]
known-first-party = ["clickhouse_async"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
version_files = [
    "pyproject.toml:version",
    "clickhouse_async/__init__.py:__version__",
]
update_changelog_on_bump = true

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
addopts = "--random-order"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
